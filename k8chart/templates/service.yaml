apiVersion: v1
kind: Service
metadata:
  name: exchangerates-svc
  labels:
    {{- include "k8chart.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "k8chart.selectorLabels" . | nindent 4 }}
