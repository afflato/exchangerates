pipeline:
  name: Spring Boot CI Pipeline
  identifier: Spring_Boot_CI_Pipeline
  projectIdentifier: devopssre
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: github_classic
        build: <+input>
  stages:
    - stage:
        name: Code Pull And Build
        identifier: Code_Pull_And_Build
        description: ""
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Build
                  identifier: Build
                  spec:
                    connectorRef: docker
                    image: amazoncorretto:25-alpine
                    shell: Sh
                    command: |-
                      # 1. Fix permissions (crucial for Cloud Runners)
                      chmod +x gradlew

                      # 2. Verify Java version (helps you debug if it fails again)
                      java -version

                      # 3. Run build with a memory limit to avoid 'Killed' errors
                      ./gradlew clean build -Dorg.gradle.jvmargs="-Xmx2g"
              - step:
                  type: Run
                  name: Sonar Scan
                  identifier: Sonar_Scan
                  spec:
                    connectorRef: docker
                    image: amazoncorretto:25-alpine
                    shell: Sh
                    command: |-
                      set -e

                      # 0. Install Git (Crucial for Sonar SCM sensor)
                      apt-get update && apt-get install -y git || apk add git

                      # 1. Updated Init Script with the correct class reference
                      cat <<EOF > sonar-init.gradle
                      initscript {
                          repositories { maven { url "https://plugins.gradle.org/m2/" } }
                          dependencies { 
                              classpath "org.sonarsource.scanner.gradle:sonarqube-gradle-plugin:7.2.3.7755"
                          }
                      }

                      def sonarFiles = initscript.configurations.classpath.files

                      allprojects { project ->
                          // Inject the JARs into each project's buildscript
                          project.buildscript {
                              dependencies {
                                  classpath project.files(sonarFiles)
                              }
                          }

                          // Apply the plugin using the now-available JARs
                          project.apply plugin: "org.sonarqube"

                          // Configuration for the root project
                          if (project == rootProject) {
                          
                              sonar {
                                  properties {
                                      property "sonar.organization", "<+secrets.getValue('sonar_org')>"
                                      property "sonar.projectKey", "<+secrets.getValue('sonar_project_key')>"
                                      property "sonar.host.url", "https://sonarcloud.io"
                                      property "sonar.token", "<+secrets.getValue('sonar_token')>"
                                      property "sonar.qualitygate.wait", "true"
                                      property "sonar.java.source", "25"
                                      property "sonar.java.target", "25"
                                  }
                              }
                          }
                          
                      }
                      EOF

                      cat sonar-init.gradle

                      git log -1 --oneline  # See the latest commit in the workspace
                      find . -name "*.java" -mmin -5 # See which files were modified in the last 5 minutes

                      # 2. Run your tests
                      chmod +x gradlew
                      ./gradlew clean test --continue

                      # 3. Run sonar AND point to the init script (The missing piece)
                      ./gradlew sonar \
                        --init-script sonar-init.gradle \
                        -Dsonar.qualitygate.wait=true
                        --info \
                        --stacktrace \
                        -Dsonar.projectKey=<+secrets.getValue("sonar_project_key")> \
                        -Dsonar.organization=<+secrets.getValue("sonar_org")> \
                        -Dsonar.host.url=https://sonarcloud.io \
                        -Dsonar.token=<+secrets.getValue("sonar_token")> \
                        -Dsonar.java.source=25 \
                        -Dsonar.java.target=25 \
                        -Dsonar.scm.provider=git
              - step:
                  type: Run
                  name: TagInfo
                  identifier: TagInfo
                  spec:
                    shell: Sh
                    command: |-
                      echo "Short Commit SHA: <+codebase.shortCommitSha>"
                      echo "Full Commit SHA: <+codebase.commitSha>"
                      echo "Trigger Type: <+pipeline.triggerType>"
                      echo "Branch: <+codebase.branch>"
              - step:
                  type: BuildAndPushDockerRegistry
                  name: BuildAndPushToDockerRegistry
                  identifier: BuildAndPushToDockerRegistry
                  spec:
                    connectorRef: docker
                    repo: afflato/exchangerates
                    tags:
                      - "${<+codebase.shortCommitSha> ?: (\"manual-\" + <+pipeline.sequenceId>)}"
                    caching: true
              - step:
                  type: Run
                  name: Update Image Tag
                  identifier: Update_Image_Tag
                  spec:
                    shell: Sh
                    command: |-
                      set -e

                      # --- DEBUGGING SECTION ---
                      echo "--- 1. Current Environment ---"
                      whoami
                      pwd

                      # echo "--- 2. Directory Structure (Recursive) ---"
                      # # This will show us exactly where 'k8chart' lives
                      # ls -R /harness

                      echo "--- 3. Checking for Git Repository ---"
                      if [ -d "/harness/.git" ]; then
                          echo "SUCCESS: .git folder found in /harness"
                      else
                          echo "WARNING: .git folder NOT found in /harness. Git commands will fail."
                      fi
                      # -------------------------

                      export IMAGE_TAG=${<+codebase.shortCommitSha> ?: ("manual-" + <+pipeline.sequenceId>)}

                      # Find the file dynamically
                      YAML_PATH=$(find /harness -name "values.yaml" | grep "k8chart" | head -n 1)

                      if [ -z "$YAML_PATH" ]; then
                          echo "ERROR: Could not find values.yaml inside a k8chart folder."
                          exit 1
                      fi

                      echo "--- 4. Updating File: $YAML_PATH ---"
                      sed -i "s|tag:.*|tag: ${IMAGE_TAG}|" "$YAML_PATH"

                      # Move to where .git is located (usually /harness)
                      cd /harness

                      # Configure and Commit
                      git config --global user.email "afflato-bot-ci@afflato.com"
                      git config --global user.name "afflato-bot-ci"

                      export GIT_PAT=<+secrets.getValue("token_classic")>
                      git remote set-url origin https://afflato:${GIT_PAT}@github.com/afflato/exchangerates.git

                      git add "$YAML_PATH"
                      git commit -m "chore: update image tag to ${IMAGE_TAG} [skip ci]" || echo "No changes to commit"

                      # Note: This will likely fail until we add the Token to the URL
                      git push origin main
